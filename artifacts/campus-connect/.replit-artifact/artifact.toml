kind = "web"
previewPath = "/"
title = "CampusConnect"
version = "1.0.0"
id = "artifacts/campus-connect"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19048

[services.development]
run = "pnpm --filter @workspace/campus-connect run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/campus-connect", "run", "build" ]
publicDir = "artifacts/campus-connect/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19048"
BASE_PATH = "/"
